name: Build and deploy Python app to Azure Web App - web-app-1

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: web-app-1
  WORKING_DIRECTORY: djbe
  PYTHON_VERSION: '3.12'
  STARTUP_COMMAND: 'gunicorn your_project.wsgi:application'  # change this

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (build check only)
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Create clean deployment folder
      - name: Prepare deployment package
        run: |
          mkdir app
          cp -r ${{ env.WORKING_DIRECTORY }}/* app/

          # remove unwanted files if they exist
          rm -rf app/antenv
          rm -rf app/__pycache__

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: app


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E9F41A4382644913B33A733D4427EFA5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_227C62C2F17F49969246DBB59BEAFE4C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CEF7F0C11BCE44D69B4648D1FCBBFC7A }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: app
